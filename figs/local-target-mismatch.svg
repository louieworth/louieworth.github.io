<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 380" role="img" aria-labelledby="title desc">
  <title id="title">Local target mismatch in on-policy distillation</title>
  <desc id="desc">A diagram showing a student-generated prefix and teacher token distributions conditioned on that prefix. The teacher target mixes recovery actions with continuations of the misleading prefix.</desc>
  <rect width="1040" height="380" fill="#fffdfc"/>

  <defs>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7b7a86"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f7d5f"/>
    </marker>
    <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45f06"/>
    </marker>
    <filter id="soft-shadow" x="-8%" y="-16%" width="116%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#282828" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="74" y="62" font-size="29" fill="#282828">Local target mismatch</text>
    <text x="74" y="92" font-size="16" fill="#6e6d80">At a misleading student prefix, the teacher's local distribution may mix recovery with continuation.</text>
  </g>

  <g font-family="'Noto Sans', 'Helvetica Neue', Arial, sans-serif">
    <text x="88" y="154" font-size="14" font-weight="700" fill="#2f4d5f">student-generated prefix</text>
    <line x1="270" y1="148" x2="760" y2="148" stroke="#282828" stroke-width="2.5"/>

    <g fill="#fffdfc" stroke="#282828" stroke-width="2.2">
      <circle cx="300" cy="148" r="11"/>
      <circle cx="430" cy="148" r="11"/>
      <circle cx="560" cy="148" r="11"/>
      <circle cx="690" cy="148" r="11"/>
    </g>

    <g font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#282828">
      <text x="300" y="118" text-anchor="middle">First,</text>
      <text x="430" y="118" text-anchor="middle">so</text>
      <text x="560" y="118" text-anchor="middle">we</text>
      <text x="690" y="118" text-anchor="middle">conclude</text>
    </g>

    <g stroke="#7b7a86" stroke-width="1.8" stroke-dasharray="5 5" marker-end="url(#arrow-gray)">
      <path d="M300 162 V196"/>
      <path d="M430 162 V196"/>
      <path d="M560 162 V196"/>
      <path d="M690 162 V196"/>
    </g>

    <rect x="228" y="196" width="568" height="126" rx="12" fill="#f4f9ff" stroke="#9ec5ff" stroke-width="2" filter="url(#soft-shadow)"/>
    <text x="250" y="226" font-size="14" font-weight="700" fill="#275a96">teacher target conditioned on the student prefix</text>
    <text x="250" y="248" font-size="12" fill="#54718f">local probabilities contain two competing directions</text>

    <g transform="translate(280 270)">
      <rect x="0" y="16" width="12" height="32" fill="#2f7d5f"/>
      <rect x="18" y="8" width="12" height="40" fill="#2f7d5f"/>
      <rect x="36" y="27" width="12" height="21" fill="#b45f06"/>
      <rect x="54" y="20" width="12" height="28" fill="#b45f06"/>
      <rect x="72" y="35" width="12" height="13" fill="#b45f06"/>
      <line x1="-4" y1="48" x2="92" y2="48" stroke="#6e6d80"/>
    </g>

    <g transform="translate(410 270)">
      <rect x="0" y="26" width="12" height="22" fill="#2f7d5f"/>
      <rect x="18" y="30" width="12" height="18" fill="#2f7d5f"/>
      <rect x="36" y="10" width="12" height="38" fill="#b45f06"/>
      <rect x="54" y="18" width="12" height="30" fill="#b45f06"/>
      <rect x="72" y="34" width="12" height="14" fill="#b45f06"/>
      <line x1="-4" y1="48" x2="92" y2="48" stroke="#6e6d80"/>
    </g>

    <g transform="translate(540 270)">
      <rect x="0" y="12" width="12" height="36" fill="#2f7d5f"/>
      <rect x="18" y="24" width="12" height="24" fill="#2f7d5f"/>
      <rect x="36" y="22" width="12" height="26" fill="#b45f06"/>
      <rect x="54" y="16" width="12" height="32" fill="#b45f06"/>
      <rect x="72" y="36" width="12" height="12" fill="#b45f06"/>
      <line x1="-4" y1="48" x2="92" y2="48" stroke="#6e6d80"/>
    </g>

    <g transform="translate(670 270)">
      <rect x="0" y="34" width="12" height="14" fill="#2f7d5f"/>
      <rect x="18" y="18" width="12" height="30" fill="#2f7d5f"/>
      <rect x="36" y="12" width="12" height="36" fill="#b45f06"/>
      <rect x="54" y="24" width="12" height="24" fill="#b45f06"/>
      <rect x="72" y="32" width="12" height="16" fill="#b45f06"/>
      <line x1="-4" y1="48" x2="92" y2="48" stroke="#6e6d80"/>
    </g>

    <g font-size="13">
      <path d="M844 228 H898" stroke="#2f7d5f" stroke-width="3" marker-end="url(#arrow-green)"/>
      <text x="910" y="232" fill="#2f7d5f">recovery actions</text>
      <path d="M844 266 H898" stroke="#b45f06" stroke-width="3" marker-end="url(#arrow-amber)"/>
      <text x="910" y="270" fill="#b45f06">continue the mistake</text>
      <text x="844" y="315" font-size="13" fill="#6e6d80">Matching the full target can</text>
      <text x="844" y="334" font-size="13" fill="#6e6d80">reinforce both directions.</text>
    </g>

  </g>
</svg>
