<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="title desc">
  <title id="title">Compact sample diagram</title>
  <desc id="desc">Three boxes connected by arrows showing prompt, model, and score.</desc>
  <rect width="720" height="320" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6e6d80"/>
    </marker>
  </defs>
  <g font-family="Georgia, 'Times New Roman', serif">
    <rect x="70" y="108" width="150" height="92" rx="12" fill="#fff7f2" stroke="#ead8cf"/>
    <rect x="285" y="88" width="150" height="132" rx="12" fill="#f8f8f8" stroke="#dddddd"/>
    <rect x="500" y="108" width="150" height="92" rx="12" fill="#f3fbf8" stroke="#cce2dc"/>
    <text x="145" y="150" text-anchor="middle" font-size="24" fill="#282828">Prompt</text>
    <text x="360" y="150" text-anchor="middle" font-size="24" fill="#282828">Model</text>
    <text x="575" y="150" text-anchor="middle" font-size="24" fill="#282828">Score</text>
    <text x="145" y="176" text-anchor="middle" font-size="14" fill="#6e6d80">input state</text>
    <text x="360" y="176" text-anchor="middle" font-size="14" fill="#6e6d80">distribution</text>
    <text x="575" y="176" text-anchor="middle" font-size="14" fill="#6e6d80">feedback</text>
  </g>
  <path d="M226 154 H274" fill="none" stroke="#6e6d80" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M441 154 H489" fill="none" stroke="#6e6d80" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M575 204 C575 268 145 268 145 207" fill="none" stroke="#e11d47" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
</svg>

