<!doctype html><html lang=en><head><meta charset=UTF-8><meta http-equiv=X-UA-Compatible content="IE=edge"><meta name=viewport content="width=device-width,initial-scale=1"><title>Li Jiang —</title><link rel=stylesheet href=../css/style.css><style>body{background:#fff;padding:0;margin:0;font:15px/1.55 charter,georgia,times new roman,serif;color:#2b2b2b}.site-wrap{max-width:820px;margin:28px auto;padding:0 24px}.title-bar{background:#2b2b2b;color:#fff;padding:10px 18px;font-size:18px;font-weight:600;margin-bottom:22px}.title-bar a{color:#fff;text-decoration:none}.home-row{display:flex;gap:28px;align-items:flex-start}.home-left{flex:1;min-width:0}.home-photo{flex:none;width:280px;height:360px;object-fit:cover;border:1px solid #ddd;display:block}.site-content h2{font-size:18px;font-weight:700;color:#1a1a1a;margin:22px 0 8px}.site-content h3{font-size:16px;margin:18px 0 6px}.site-content p{margin:0 0 10px}.site-content ul{padding-left:22px;margin:6px 0 12px}.site-content li{margin:2px 0}.site-content a{color:#267cb9;text-decoration:none}.site-content a:hover{text-decoration:underline}.home-nav{margin-top:14px;padding-left:22px}.home-nav li{list-style:disc;margin:2px 0}.home-nav a{color:#267cb9}.back-link{display:inline-block;margin-bottom:16px;font-size:13px;color:#267cb9;text-decoration:none}.back-link:hover{text-decoration:underline}.back-link::before{content:"← "}.site-footer{margin-top:48px;padding-top:10px;border-top:1px solid #eee;color:#999;font-size:12px}@media(max-width:720px){.home-row{flex-direction:column-reverse;gap:16px}.home-photo{width:200px;height:260px}}</style></head><body><div class=site-wrap><div class=title-bar><a href=../>Li Jiang's Homepage</a></div><div class=site-content><h2 id=personal>Personal</h2><h2 id=recent-blog-posts>Recent Blog Posts</h2><div id=blog_posts><p>Loading</p></div><script>function loadPosts(){var t=new XMLHttpRequest,e=document.getElementById("blog_posts");t.onreadystatechange=function(){if(this.readyState==4&&this.status==200){for(var n,s,o,a,r,c,l=JSON.parse(this.responseText),t=l.posts;e.hasChildNodes();)e.removeChild(e.firstChild);n=document.createElement("ul");for(i in t){if(i>=5)break;s=document.createElement("li"),o=t[i].rellink,a=t[i].title,r=new Date(t[i].date),c=r.toLocaleDateString("en-US"),s.innerHTML=`<a href="https://blog.leiy.me${o}" target="blank">${a}</a> - ${c}`,n.appendChild(s)}e.appendChild(n)}else this.readyState==4&&this.status!=200&&(e.innerHTML='<p>Unable to load from <a href="https://blog.leiy.me">blog.leiy.me</a>.</p>')},t.open("GET","https://blog.leiy.me/index.json",!0),t.send()}loadPosts()</script><h2 id=misc>Misc</h2><p>Random stuff I created. Enjoy!</p><ul><li><a href=../personal/fit-paper/>Fit your paper into 12 pages</a></li><li><a href=../personal/hometown/>Hometown</a></li><li><a href=../personal/mac-native/>Incomplete list of native Mac app developers</a></li><li><a href=../personal/programming-languages/>Languages</a></li><li><a href=../personal/x11/>X11 Forwarding from macOS</a></li></ul></div><div class=site-footer>Last updated May 19, 2026</div></div><script data-goatcounter=https://lijiang.goatcounter.com/count async src=//gc.zgo.at/count.js></script></body></html>
